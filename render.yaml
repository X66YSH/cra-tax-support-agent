services:
  - type: web
    name: cra-tax-support-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_BASE_URL
        value: https://rsm-8430-finalproject.bjlkeng.io
      - key: LLM_MODEL
        value: qwen3-30b-a3b-fp8
      - key: LLM_API_KEY
        sync: false  # set manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.9
